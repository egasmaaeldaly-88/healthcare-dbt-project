version: 2

models:
  - name: bronze_patients
    description: "Raw patient records ingested from healthcare_platform.patients."
    columns:
      - name: patient_id
        tests:
          - not_null
          - unique
      - name: national_id
        tests:
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: gender
        tests:
          - accepted_values:
              values: ['MALE', 'FEMALE', 'UNSPECIFIED', 'M', 'F', 'm', 'f']
      - name: _bronze_loaded_at
        tests:
          - not_null
      - name: _dbt_run_id
        tests:
          - not_null

  - name: bronze_vitals
    description: "Raw vitals ingested incrementally."
    columns:
      - name: vital_id
        tests:
          - not_null
          - unique
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('bronze_patients')
              field: patient_id
      - name: recorded_at
        tests:
          - not_null
      - name: source_system
        tests:
          - not_null

  - name: bronze_medications
    description: "Raw medication records ingested incrementally."
    columns:
      - name: med_id
        tests:
          - not_null
          - unique
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('bronze_patients')
              field: patient_id
      - name: drug_name
        tests:
          - not_null
      - name: _bronze_loaded_at
        tests:
          - not_null