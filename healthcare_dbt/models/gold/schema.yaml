version: 2

models:

  - name: gold_patient_summary
    description: "One row per patient with aggregated vitals and medication counts."
    columns:
      - name: patient_id
        tests:
          - not_null
          - unique
      - name: full_name
        tests:
          - not_null
      - name: avg_systolic_bp
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 60
                max_value: 250
              config:
                where: "avg_systolic_bp IS NOT NULL"

  - name: gold_risk_scores
    columns:
      - name: patient_id
        tests:
          - not_null
          - unique
      - name: risk_level
        tests:
          - accepted_values:
              arguments:
                values: ['LOW', 'MEDIUM', 'HIGH']
      - name: composite_risk_score
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 200

  - name: gold_doctor_dashboard
    description: "Full dashboard view — one row per patient with risk flags and latest readings."
    columns:
      - name: patient_id
        tests:
          - not_null
          - unique
      - name: risk_level
        tests:
          - accepted_values:
              arguments:
                values: ['LOW', 'MEDIUM', 'HIGH']
      - name: flag_high_risk
        tests:
          - not_null
      - name: flag_low_spo2
        tests:
          - not_null
      - name: flag_high_bp
        tests:
          - not_null